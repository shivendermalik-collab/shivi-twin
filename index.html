<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivi-Twin — Gmail</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #4af7a0;
    --card: #16161f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 48px;
  }

  .logo {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: white;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
  }

  h1 span {
    color: var(--accent);
  }

  .badge {
    margin-left: auto;
    background: rgba(124,106,247,0.1);
    border: 1px solid rgba(124,106,247,0.2);
    color: var(--accent);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  /* Auth section */
  #auth-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px;
    text-align: center;
  }

  .auth-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, rgba(124,106,247,0.2), rgba(247,106,138,0.2));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 32px;
  }

  #auth-section h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 24px;
    margin-bottom: 12px;
  }

  #auth-section p {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
    max-width: 400px;
    margin: 0 auto 32px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-decoration: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9c7cf7);
    color: white;
    box-shadow: 0 4px 20px rgba(124,106,247,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(124,106,247,0.4);
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-danger {
    background: rgba(247,106,138,0.1);
    color: var(--accent2);
    border: 1px solid rgba(247,106,138,0.2);
  }

  /* Main app */
  #app-section { display: none; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(74,247,160,0.08);
    border: 1px solid rgba(74,247,160,0.2);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--success);
  }

  .dot {
    width: 7px;
    height: 7px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Email list */
  .email-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  .email-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }

  .email-card:hover {
    border-color: var(--accent);
    background: rgba(124,106,247,0.05);
    transform: translateX(4px);
  }

  .email-card.selected {
    border-color: var(--accent);
    background: rgba(124,106,247,0.08);
  }

  .email-card.unread .email-from {
    color: white;
    font-weight: 500;
  }

  .email-from {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .email-subject {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .email-date {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .unread-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-top: 4px;
    justify-self: end;
  }

  /* Email detail */
  #email-detail {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
    display: none;
  }

  .detail-header {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .detail-subject {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .detail-meta {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .detail-body {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 300px;
    overflow-y: auto;
  }

  /* Claude analysis */
  #claude-output {
    background: linear-gradient(135deg, rgba(124,106,247,0.05), rgba(247,106,138,0.05));
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    display: none;
  }

  .claude-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
  }

  .claude-content {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* Draft area */
  #draft-area {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    display: none;
  }

  .draft-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    resize: vertical;
    min-height: 140px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  /* Loading */
  .loading {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .status-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    display: none;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">ST</div>
    <h1>Shivi<span>-twin</span></h1>
    <div class="badge">GMAIL</div>
  </header>

  <!-- Auth Section -->
  <div id="auth-section">
    <div class="auth-icon">✉️</div>
    <h2>Connect your Gmail</h2>
    <p>Sign in with Google to let Shivi-twin read, summarize, and draft replies to your emails using Claude AI.</p>
    <button class="btn btn-primary" onclick="startAuth()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>

  <!-- Main App -->
  <div id="app-section">
    <div class="toolbar">
      <div class="user-chip">
        <div class="dot"></div>
        <span id="user-email">Connected</span>
      </div>
      <button class="btn btn-secondary" onclick="loadEmails()" id="refresh-btn">↻ Refresh</button>
      <button class="btn btn-danger" onclick="signOut()" style="margin-left:auto">Sign out</button>
    </div>

    <div class="status-bar" id="status-bar"></div>

    <div class="section-title">Inbox</div>
    <div class="email-list" id="email-list">
      <div class="empty-state">Loading emails...</div>
    </div>

    <div id="email-detail">
      <div class="detail-header">
        <div class="detail-subject" id="detail-subject"></div>
        <div class="detail-meta">
          <span id="detail-from"></span>
          <span id="detail-date"></span>
        </div>
      </div>
      <div class="detail-body" id="detail-body"></div>
      <div class="action-row" style="margin-top:20px">
        <button class="btn btn-primary" onclick="analyzeWithClaude()">✦ Summarize with Claude</button>
        <button class="btn btn-secondary" onclick="draftReply()">✦ Draft Reply</button>
      </div>
    </div>

    <div id="claude-output">
      <div class="claude-header">✦ Claude's Analysis</div>
      <div class="claude-content" id="claude-content"></div>
    </div>

    <div id="draft-area">
      <div class="draft-label">Draft Reply</div>
      <textarea id="draft-text" placeholder="Claude is drafting your reply..."></textarea>
      <div class="action-row">
        <button class="btn btn-primary" onclick="copyDraft()">Copy to clipboard</button>
        <button class="btn btn-secondary" onclick="document.getElementById('draft-area').style.display='none'">Discard</button>
      </div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '322751089633-u99meo5em7lnco8blpl5dtgosiarcmkf.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/userinfo.email';
// Note: This uses OAuth implicit flow — no client secret needed in the browser.

let accessToken = null;
let currentEmail = null;
let emails = [];

function startAuth() {
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: window.location.href.split('?')[0],
    response_type: 'token',
    scope: SCOPES,
    prompt: 'consent'
  });
  window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
}

function checkAuth() {
  // Check URL hash for token (implicit flow)
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  
  if (token) {
    accessToken = token;
    window.location.hash = '';
    showApp();
    return;
  }

  // Check sessionStorage
  const stored = sessionStorage.getItem('gmail_token');
  if (stored) {
    accessToken = stored;
    showApp();
    return;
  }
}

async function showApp() {
  sessionStorage.setItem('gmail_token', accessToken);
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('app-section').style.display = 'block';
  
  // Get user info
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await res.json();
    document.getElementById('user-email').textContent = data.email || 'Connected';
  } catch(e) {}

  loadEmails();
}

function signOut() {
  sessionStorage.removeItem('gmail_token');
  accessToken = null;
  document.getElementById('auth-section').style.display = 'block';
  document.getElementById('app-section').style.display = 'none';
}

async function loadEmails() {
  showStatus('Fetching emails...');
  document.getElementById('email-list').innerHTML = '<div class="empty-state"><div class="loading"><div class="spinner"></div> Loading inbox...</div></div>';
  
  try {
    // Get message IDs
    const listRes = await fetch(
      'https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=15&labelIds=INBOX',
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    const listData = await listRes.json();
    
    if (!listData.messages) {
      document.getElementById('email-list').innerHTML = '<div class="empty-state">No emails found</div>';
      hideStatus();
      return;
    }

    // Fetch each message
    emails = await Promise.all(
      listData.messages.map(async (msg) => {
        const msgRes = await fetch(
          `https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`,
          { headers: { Authorization: `Bearer ${accessToken}` } }
        );
        return msgRes.json();
      })
    );

    renderEmailList();
    hideStatus();
  } catch(e) {
    document.getElementById('email-list').innerHTML = '<div class="empty-state">Error loading emails. Please sign in again.</div>';
    hideStatus();
  }
}

function renderEmailList() {
  const list = document.getElementById('email-list');
  
  if (!emails.length) {
    list.innerHTML = '<div class="empty-state">No emails</div>';
    return;
  }

  list.innerHTML = emails.map((email, i) => {
    const headers = email.payload?.headers || [];
    const from = getHeader(headers, 'From') || 'Unknown';
    const subject = getHeader(headers, 'Subject') || '(no subject)';
    const date = formatDate(getHeader(headers, 'Date'));
    const isUnread = email.labelIds?.includes('UNREAD');
    const fromShort = from.replace(/<.*>/, '').trim() || from;

    return `
      <div class="email-card ${isUnread ? 'unread' : ''}" onclick="openEmail(${i})">
        <div>
          <div class="email-from">${escapeHtml(fromShort)}</div>
          <div class="email-subject">${escapeHtml(subject)}</div>
        </div>
        <div style="text-align:right">
          <div class="email-date">${date}</div>
          ${isUnread ? '<div class="unread-dot"></div>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

async function openEmail(index) {
  // Highlight selected
  document.querySelectorAll('.email-card').forEach((el, i) => {
    el.classList.toggle('selected', i === index);
  });

  showStatus('Loading email...');
  document.getElementById('claude-output').style.display = 'none';
  document.getElementById('draft-area').style.display = 'none';

  try {
    const msg = emails[index];
    // Fetch full message
    const res = await fetch(
      `https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}?format=full`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    const data = await res.json();
    currentEmail = data;

    const headers = data.payload?.headers || [];
    const subject = getHeader(headers, 'Subject') || '(no subject)';
    const from = getHeader(headers, 'From') || 'Unknown';
    const date = formatDate(getHeader(headers, 'Date'));
    const body = extractBody(data.payload);

    document.getElementById('detail-subject').textContent = subject;
    document.getElementById('detail-from').textContent = '✉ ' + from;
    document.getElementById('detail-date').textContent = '🕐 ' + date;
    document.getElementById('detail-body').textContent = body || '(empty body)';
    document.getElementById('email-detail').style.display = 'block';

    hideStatus();
  } catch(e) {
    hideStatus();
    showStatus('Error loading email');
  }
}

async function analyzeWithClaude() {
  if (!currentEmail) return;

  const headers = currentEmail.payload?.headers || [];
  const subject = getHeader(headers, 'Subject') || '';
  const from = getHeader(headers, 'From') || '';
  const body = extractBody(currentEmail.payload) || '';

  document.getElementById('claude-output').style.display = 'block';
  document.getElementById('claude-content').innerHTML = '<div class="loading"><div class="spinner"></div> Claude is reading...</div>';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Analyze this email and provide:
1. **TL;DR** (1-2 sentences max)
2. **Action required?** (Yes/No + what)
3. **Tone** of the email
4. **Priority** (High/Medium/Low)
5. **Key points** (bullet list)

Email:
From: ${from}
Subject: ${subject}
Body: ${body.substring(0, 3000)}`
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || 'Could not analyze email.';
    document.getElementById('claude-content').textContent = text;
  } catch(e) {
    document.getElementById('claude-content').textContent = 'Error connecting to Claude. Please try again.';
  }
}

async function draftReply() {
  if (!currentEmail) return;

  const headers = currentEmail.payload?.headers || [];
  const subject = getHeader(headers, 'Subject') || '';
  const from = getHeader(headers, 'From') || '';
  const body = extractBody(currentEmail.payload) || '';

  document.getElementById('draft-area').style.display = 'block';
  document.getElementById('draft-text').value = 'Claude is drafting your reply...';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Draft a professional, concise reply to this email. Be direct and helpful. Match the tone of the original.

Original email:
From: ${from}
Subject: ${subject}
Body: ${body.substring(0, 2000)}

Write only the reply body, no subject line needed.`
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || 'Could not draft reply.';
    document.getElementById('draft-text').value = text;
  } catch(e) {
    document.getElementById('draft-text').value = 'Error connecting to Claude. Please try again.';
  }
}

function copyDraft() {
  const text = document.getElementById('draft-text').value;
  navigator.clipboard.writeText(text).then(() => {
    showStatus('✓ Copied to clipboard!');
    setTimeout(hideStatus, 2000);
  });
}

// Helpers
function getHeader(headers, name) {
  return headers.find(h => h.name.toLowerCase() === name.toLowerCase())?.value;
}

function extractBody(payload) {
  if (!payload) return '';
  
  if (payload.body?.data) {
    return atob(payload.body.data.replace(/-/g, '+').replace(/_/g, '/'));
  }
  
  if (payload.parts) {
    for (const part of payload.parts) {
      if (part.mimeType === 'text/plain' && part.body?.data) {
        return atob(part.body.data.replace(/-/g, '+').replace(/_/g, '/'));
      }
    }
    for (const part of payload.parts) {
      const nested = extractBody(part);
      if (nested) return nested;
    }
  }
  
  return '';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = now - d;
    if (diff < 86400000) return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if (diff < 604800000) return d.toLocaleDateString([], {weekday:'short'});
    return d.toLocaleDateString([], {month:'short', day:'numeric'});
  } catch(e) { return dateStr; }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showStatus(msg) {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.style.display = 'block';
}

function hideStatus() {
  document.getElementById('status-bar').style.display = 'none';
}

// Init
checkAuth();
</script>
